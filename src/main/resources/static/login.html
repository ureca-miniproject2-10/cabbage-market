<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4 shadow">
        <h2 class="text-center mb-4">로그인</h2>

        <form id="loginForm" action="/login" method="POST">
          <div class="mb-3">
            <label for="username" class="form-label">아이디</label>
            <input type="text" id="username" name="username" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">비밀번호</label>
            <input type="password" id="password" name="password" class="form-control" required>
          </div>

          <input type="hidden" name="_csrf" value="" id="_csrf">
          <button type="submit" class="btn btn-primary w-100">로그인</button>

          <div class="text-center mt-3">
            계정이 없으신가요? <a href="register.html">회원가입</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="common/csrf.js"></script>
<script>

  // 로그인 요청
  async function loginUser(username, password, csrfToken) {
    try {
      console.log("로그인 요청 데이터:", { username, password, csrfToken });

      // FormData 사용
      const formData = new URLSearchParams();
      formData.append("username", username);
      formData.append("password", password);
      formData.append("_csrf", csrfToken);

      const response = await fetch('/login', {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded'  // FormData 형식
        },
        body: formData.toString()
      });

      if (response.ok) {
        alert("로그인 성공");
        window.location.href = "/index.html";
      } else {
        const errorData = await response.json();
        alert("로그인 실패: " + (errorData.message || "알 수 없는 오류"));
      }
    } catch (error) {
      console.error("로그인 요청 실패:", error);
      alert("로그인 요청 실패");
    }
  }


  // DOM 로드 후 초기화
  document.addEventListener("DOMContentLoaded", async () => {

    const csrfToken = await fetchCsrfToken(); // CSRF 토큰 먼저 로드

    // 폼 요소 가져오기
    const form = document.getElementById("loginForm");
    form.addEventListener("submit", (event) => {
      event.preventDefault(); // 기본 폼 제출 동작 차단

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      console.log("폼 데이터:", { username, password, csrfToken });

      if (!username || !password) {
        alert("아이디와 비밀번호를 입력해주세요.");
        return;
      }

      // CSRF 토큰이 비어있으면 다시 시도
      if (!csrfToken) {
        alert("CSRF 토큰이 설정되지 않았습니다. 페이지를 새로고침 해주세요.");
        return;
      }

      // 로그인 요청
      loginUser(username, password, csrfToken);
    });
  });

</script>

</body>
</html>
