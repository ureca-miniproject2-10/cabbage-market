<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .post-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">📋 전체 게시글</h2>

    <div class="row" id="post-list"></div>

    <nav aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center" id="pagination"></ul>
    </nav>
</div>

<script>

    let currentPage = 0;

    async function fetchPosts(page = 0) {
        currentPage = page;
        const response = await fetch(`/api/posts?pageNumber=${page}&pageSize=10`);
        const result = await response.json();

        if (!result.success) {
            alert("게시글을 불러오지 못했습니다.");
            return;
        }

        const { content, totalPages, number } = result.data;
        renderPosts(content);
        renderPagination(totalPages, number);
    }


    function renderPosts(posts) {
        const postList = document.getElementById("post-list");
        postList.innerHTML = "";

        posts.forEach(post => {
            const imageUrl = post.imageUrl || "/images/default_post.jpg";
            const card = `
        <div class="col-md-4 mb-4">
          <div class="card post-card shadow-sm">
            <img src="${imageUrl}" class="card-img-top" alt="썸네일">
            <div class="card-body">
              <h5 class="card-title">${post.title}</h5>
              <p class="card-text">💰 ${post.price}원</p>
              <p class="card-text text-muted small">👤 ${post.name} · 👁️ ${post.viewCnt} · 🚩 ${post.reportCnt}</p>
              <p class="card-text text-muted small">${new Date(post.createdAt).toLocaleString()}</p>
              <a href="/posts/${post.postId}" class="btn btn-outline-primary btn-sm">자세히 보기</a>
            </div>
          </div>
        </div>`;
            postList.innerHTML += card;
        });
    }

    function renderPagination(totalPages, currentPage) {
        const pagination = document.getElementById("pagination");
        pagination.innerHTML = "";

        for (let i = 0; i < totalPages; i++) {
            const activeClass = i === currentPage ? "active" : "";
            pagination.innerHTML += `
        <li class="page-item ${activeClass}">
          <button class="page-link" onclick="fetchPosts(${i})">${i + 1}</button>
        </li>`;
        }
    }

    // 초기 로딩
    fetchPosts(currentPage);
</script>
</body>
</html>
