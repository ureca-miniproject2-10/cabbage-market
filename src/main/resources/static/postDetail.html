<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>배추마켓 - 게시글 상세</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/common/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 모달 스타일 */
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            border-radius: 0.5rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
<div id="navbar-container"></div>

<main class="max-w-5xl mx-auto px-4 py-10">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">

        <!-- 이미지와 좋아요 버튼 (왼쪽) -->
        <div class="space-y-4">
            <div class="w-full">
                <img id="postImage" src="/images/default_post.jpg" alt="게시글 이미지"
                     class="w-full max-h-[400px] object-cover rounded-lg border border-gray-200"/>
            </div>
            <!-- 좋아요 버튼 -->
            <div>
                <button id="likeButton" class="flex items-center gap-1 text-sm px-4 py-2 rounded-full bg-gray-100 hover:bg-red-100 text-gray-700 hover:text-red-600 transition">
                    ❤️ <span id="likeText">좋아요</span>
                </button>
            </div>
        </div>

        <!-- 상세 정보 (오른쪽) -->
        <div class="space-y-5">
            <div class="flex justify-between items-center">
                <span id="postState" class="inline-block bg-gray-100 text-gray-700 text-sm px-3 py-1 rounded-full">상태</span>

                <!-- 수정/삭제 버튼 (작성자에게만 표시) -->
                <div id="authorActions" class="hidden space-x-2">
                    <button id="editButton" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-sm transition-colors">
                        수정
                    </button>
                    <button id="deleteButton" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-sm transition-colors">
                        삭제
                    </button>
                </div>
            </div>

            <h2 id="postTitle" class="text-2xl font-bold"></h2>
            <p id="postPrice" class="text-emerald-600 text-xl font-bold"></p>

            <!-- 사용자 정보 -->
            <div class="flex items-center gap-3 py-2 border-t border-b border-gray-100">
                <img id="userImage" src="/images/default_user.png" alt="유저 이미지"
                     class="w-10 h-10 rounded-full border border-gray-300" />
                <span id="userName" class="font-medium text-gray-800">익명</span>
            </div>

            <p id="postContent" class="text-base leading-relaxed text-gray-700"></p>

            <div class="flex items-center text-sm text-gray-500 space-x-4">
                <span>❤️ <span id="postLike">0</span></span>
                <span>조회수 <span id="postView">0</span></span>
                <span id="postCreated" class="text-gray-400">날짜</span>
            </div>

            <!-- 채팅 입력 -->
            <div class="flex mt-6">
                <input id="chatInput" type="text" placeholder="댓글을 입력하세요"
                       class="flex-grow border border-gray-300 px-4 py-2 rounded-l-full focus:outline-none focus:ring-1 focus:ring-emerald-500 text-sm" />
                <button onclick="sendChat()"
                        class="bg-emerald-600 text-white px-4 rounded-r-full hover:bg-emerald-700 transition-colors text-sm">
                    입력
                </button>
            </div>

            <div class="mt-6" id="commentSection">
                <h4 class="text-lg font-semibold mb-2">댓글</h4>
                <ul id="commentList" class="space-y-3"></ul>
            </div>
        </div>
    </div>
</main>

<div id="modal-container"></div>

<div id="footer-container"></div>

<!-- 스크립트 -->
<script>
    let currentPostId = null;
    let currentUserId = null;
    let postAuthorId = null;

    document.addEventListener("DOMContentLoaded", async () => {
        currentPostId = new URLSearchParams(location.search).get("postId");
        if (currentPostId) {
            // 먼저 현재 사용자 정보를 가져온 후 게시글 정보를 가져옵니다
            await fetchCurrentUser();
            await fetchPostDetail(currentPostId);
            await fetchLikeStatus(currentPostId);
        }

        // 수정 버튼 이벤트 리스너
        document.getElementById("editButton").addEventListener("click", () => {
            window.location.href = `/post-edit.html?postId=${currentPostId}`;
        });

        // 삭제 버튼 이벤트 리스너
        document.getElementById("deleteButton").addEventListener("click", () => {
            document.getElementById("deleteModal").style.display = "flex";
        });

        // 삭제 취소 버튼
        document.getElementById("cancelDelete").addEventListener("click", () => {
            document.getElementById("deleteModal").style.display = "none";
        });

        // 삭제 확인 버튼
        document.getElementById("confirmDelete").addEventListener("click", () => {
            deletePost();
        });

        // 삭제 버튼 클릭 시
        document.getElementById("deleteButton").addEventListener("click", () => {
            showModal("정말로 이 게시글을 삭제하시겠습니까?", deletePost, true);
        });

    });

    // 현재 로그인한 사용자 정보 가져오기
    async function fetchCurrentUser() {
        try {
            const response = await fetch('/auth/me', {
                method: 'GET',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                const result = await response.json();
                console.log(result);
                currentUserId = result.userId;
                console.log("현재 사용자 ID:", currentUserId);
            }
        } catch (error) {
            console.error("사용자 정보 로드 오류:", error);
        }
    }

    // 게시글 작성자 확인
    function checkPostAuthor() {
        console.log("작성자 확인 - 현재 사용자:", currentUserId, "게시글 작성자:", postAuthorId);

        // 숫자로 변환하여 비교 (문자열과 숫자 비교 문제 방지)
        const userId = Number(currentUserId);
        const authorId = Number(postAuthorId);

        if (userId && authorId && userId === authorId) {
            console.log("작성자 일치: 수정/삭제 버튼 표시");
            document.getElementById("authorActions").classList.remove("hidden");
        } else {
            console.log("작성자 불일치: 수정/삭제 버튼 숨김");
        }
    }

    async function fetchPostDetail(postId) {
        try {
            const response = await fetch(`/api/posts/${postId}`);

            // 응답 상태 코드 확인
            if (response.status === 307) {
                // 임시 리다이렉트 - 반성문 제출 페이지로 이동
                alert("거래가 제한되어 반성문을 제출하셔야 합니다.")
                window.location.href = `/apology-form.html?postId=${postId}`;
                return;
            }

            if (response.status === 403) {
                // 임시 리다이렉트 - 반성문 제출 페이지로 이동
                alert("거래제한된 게시글에는 접근할 수 없습니다.")
                window.location.href = `/posts.html`;
                return;
            }

            // 응답 메시지 확인 - 반성문 제출이 필요한 경우
            if (response.message === "이 게시글은 제한 상태입니다. 반성문을 제출해주세요.") {
                window.location.href = `/apology-form.html?postId=${postId}`;
                return;
            }

            if (!response.ok) {
                throw new Error("게시글을 불러오는데 실패했습니다.");
            }

            const result = await response.json();

            const post = result.data;

            document.getElementById("postImage").src = post.imageUrl || "/images/default_post.jpg";
            document.getElementById("postTitle").innerText = post.title;
            document.getElementById("postPrice").innerText = post.price ? post.price.toLocaleString() + '원' : '나눔';
            document.getElementById("postState").innerText = getPostStateLabel(post.state);
            document.getElementById("postLike").innerText = post.likeCnt;
            document.getElementById("postView").innerText = post.viewCnt;
            document.getElementById("postContent").innerText = post.content;
            document.getElementById("postCreated").innerText = new Date(post.createdAt).toLocaleString();
            document.getElementById("userName").innerText = post.userSimpleDto?.name || "익명";

            if (post.userSimpleDto) {
                document.getElementById("userImage").src = post.userSimpleDto.profileImageUrl || "/images/default_user.png";
            }

            // 게시글 작성자 ID 저장
            if (post.userSimpleDto) {
                postAuthorId = post.userSimpleDto.userId;
                console.log("게시글 작성자 ID:", postAuthorId);

                // 작성자 확인
                checkPostAuthor();

                if (post.userSimpleDto.userId === currentUserId) {
                    const likeBtn = document.getElementById("likeButton");
                    likeBtn.disabled = true;
                    likeBtn.classList.add("opacity-50", "cursor-not-allowed");
                }
            }

            renderComments(post.comments || []);
        } catch (error) {
            console.error("게시글 상세 정보 로드 오류:", error);
            showModal("게시글을 불러오는데 실패했습니다.");
        }
    }

    function getPostStateLabel(state) {
        switch (state) {
            case "SALE": return "판매중";
            case "SOLD_OUT": return "거래종료";
            case "RESTRICT": return "거래제한";
            default: return "알 수 없음";
        }
    }

    function renderComments(comments) {
        const commentList = document.getElementById("commentList");
        commentList.innerHTML = "";

        if (!comments || comments.length === 0) {
            commentList.innerHTML = `<li class="text-sm text-gray-500">등록된 댓글이 없습니다.</li>`;
            return;
        }

        comments.forEach(comment => {
            const username = comment.user?.name || "익명";
            const createdAt = new Date(comment.createdAt).toLocaleString();

            const li = document.createElement("li");
            li.className = "p-3 bg-gray-100 rounded text-sm flex justify-between items-start";
            li.dataset.commentId = comment.commentId;

            const left = document.createElement("div");
            left.innerHTML = `
            <div class="font-medium text-gray-800">${username}</div>
            <div class="text-gray-700 mt-1 content">${comment.content}</div>
            <div class="text-xs text-gray-400 mt-1">${createdAt}</div>
        `;

            li.appendChild(left);

            if (comment.user?.userId === currentUserId) {
                const right = document.createElement("div");
                right.className = "text-xs flex flex-col gap-1 ml-4 whitespace-nowrap";

                right.innerHTML = `
                <button class="edit-btn text-blue-600">수정</button>
                <button class="delete-btn text-red-500">삭제</button>
            `;
                li.appendChild(right);
            }

            commentList.appendChild(li);
        });
    }



    async function sendChat() {
        const message = document.getElementById("chatInput").value.trim();
        if (!message) return showModal("채팅 내용을 입력하세요.");

        const csrfToken = await fetchCsrfToken();
        if (!csrfToken) return showModal("CSRF 토큰이 필요합니다.");

        try {
            const response = await fetch(`/api/posts/${currentPostId}/comments`, {
                method: "POST",
                credentials: "include",
                headers: {
                    "Content-Type": "application/json",
                    "X-XSRF-TOKEN": csrfToken
                },
                body: JSON.stringify({ content: message })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.message || "댓글 등록 실패");
            }

            document.getElementById("chatInput").value = "";

            // 댓글 포함 전체 게시글 다시 불러오기
            fetchPostDetail(currentPostId);

            const result = await response.json();
            const newComment = result.data;

            // 기존 목록에 append (선택) 또는 새로 전체 fetch
            const commentList = document.getElementById("commentList");

            const li = document.createElement("li");
            li.className = "p-3 bg-gray-100 rounded text-sm";
            li.dataset.commentId = newComment.commentId; // commentId 보관
            li.innerHTML = `
                <div class="font-medium text-gray-800">${newComment.username || "익명"}</div>
                <div class="text-gray-700 mt-1 content">${newComment.content}</div>
                <div class="text-xs text-gray-400 mt-1">${new Date(newComment.createdAt).toLocaleString()}</div>
                <div class="mt-2 flex gap-2 text-xs">
                    <button class="edit-btn text-blue-600">수정</button>
                    <button class="delete-btn text-red-500">삭제</button>
                </div>
            `;

            commentList.appendChild(li);

            // 입력창 초기화
            document.getElementById("chatInput").value = "";

        } catch (err) {
            console.error("댓글 등록 에러:", err);
            showModal("로그인 후 이용해주세요.");
        }
    }

    // 게시글 삭제 함수
    async function deletePost() {
        try {
            const csrfToken = await fetchCsrfToken();

            const response = await fetch(`/api/posts/${currentPostId}`, {
                method: 'DELETE',
                credentials: 'include',
                headers: {
                    'X-XSRF-TOKEN': csrfToken
                }
            });

            if (!response.ok) {
                throw new Error('게시글 삭제에 실패했습니다.');
            }

            showModal('게시글이 성공적으로 삭제되었습니다.');

            // 게시글 목록 페이지로 이동
            window.location.href = '/index.html';
        } catch (error) {
            console.error('게시글 삭제 오류:', error);
            showModal('게시글 삭제에 실패했습니다.');
            document.getElementById("deleteModal").style.display = "none";
        }
    }

    commentList.addEventListener("click", async (e) => {
        const li = e.target.closest("li");
        const commentId = li?.dataset?.commentId;

        if (e.target.classList.contains("edit-btn")) {
            const li = e.target.closest("li");
            const contentDiv = li.querySelector(".content");
            const originalContent = contentDiv.textContent.trim();

            // 이미 수정 중이면 무시
            if (li.querySelector("input.comment-edit-input")) return;

            // input 생성
            const input = document.createElement("input");
            input.type = "text";
            input.value = originalContent;
            input.className = "comment-edit-input border border-gray-300 px-2 py-1 text-sm rounded w-full";
            contentDiv.replaceWith(input);
            input.focus();

            // 저장 버튼 UI 생성
            const saveBtn = document.createElement("button");
            saveBtn.textContent = "저장";
            saveBtn.className = "text-green-600 text-xs mt-2";

            // 버튼을 기존 수정/삭제 버튼 옆에 삽입
            e.target.parentElement.appendChild(saveBtn);

            // 저장 버튼 클릭 시 서버로 PUT 요청
            saveBtn.addEventListener("click", async () => {
                const newContent = input.value.trim();
                if (!newContent) return showModal("내용을 입력하세요.");

                const csrfToken = await fetchCsrfToken();
                try {
                    const response = await fetch(`/api/comments/${li.dataset.commentId}`, {
                        method: "PUT",
                        credentials: "include",
                        headers: {
                            "Content-Type": "application/json",
                            "X-XSRF-TOKEN": csrfToken
                        },
                        body: JSON.stringify({ content: newContent })
                    });

                    if (!response.ok) throw new Error("수정 실패");

                    const result = await response.json();

                    // 수정 성공 → 새 div로 교체
                    const newContentDiv = document.createElement("div");
                    newContentDiv.className = "text-gray-700 mt-1 content";
                    newContentDiv.textContent = result.data.content;
                    input.replaceWith(newContentDiv);
                    saveBtn.remove();

                    showModal("댓글이 수정되었습니다.");
                } catch (err) {
                    console.error(err);
                    showModal("댓글 수정에 실패했습니다.");
                    // 복원
                    const restoreDiv = document.createElement("div");
                    restoreDiv.className = "text-gray-700 mt-1 content";
                    restoreDiv.textContent = originalContent;
                    input.replaceWith(restoreDiv);
                    saveBtn.remove();
                }
            });

            // Enter 키로도 저장 가능하게
            input.addEventListener("keypress", (e) => {
                if (e.key === "Enter") saveBtn.click();
            });
        }
        else if (e.target.classList.contains("delete-btn")) {
            if (!confirm("댓글을 삭제하시겠습니까?")) return;

            const csrfToken = await fetchCsrfToken();
            try {
                const response = await fetch(`/api/comments/${commentId}`, {
                    method: "DELETE",
                    credentials: "include",
                    headers: {
                        "X-XSRF-TOKEN": csrfToken
                    }
                });

                if (!response.ok) throw new Error("댓글 삭제 실패");

                li.remove();
                showModal("댓글이 삭제되었습니다.");
            } catch (err) {
                console.error(err);
                showModal("댓글 삭제 실패");
            }
        }


    });

    function renderLikeState(isLiked) {
        const likeBtn = document.getElementById("likeButton");
        const likeText = document.getElementById("likeText");

        async function toggleLike() {
            try {
                const csrfToken = await fetchCsrfToken();

                const response = await fetch(`/api/likes/${currentPostId}`, {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/json",
                        "X-XSRF-TOKEN": csrfToken
                    }
                });

                if (!response.ok) throw new Error("좋아요 요청 실패");

                const result = await response.json();
                const isLiked = result.data?.isLiked;
                const likeCnt = result.data?.likeCnt;

                renderLikeState(isLiked);

                document.getElementById("postLike").innerText = likeCnt;

            } catch (err) {
                console.error("좋아요 토글 실패:", err);
                showModal("로그인 후 이용해주세요.");
            }
        }


        if (isLiked) {
            likeBtn.classList.add("text-red-500");
            likeText.textContent = "좋아요 취소";
        } else {
            likeBtn.classList.remove("text-red-500");
            likeText.textContent = "좋아요";
        }
    }


    async function fetchLikeStatus(postId) {
        try {
            const response = await fetch(`/api/likes/${postId}`, {
                method: "GET",
                credentials: "include",
                headers: {
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) throw new Error("좋아요 상태 조회 실패");

            const result = await response.json();
            const isLiked = result.data?.isLiked;

            renderLikeState(isLiked);
        } catch (err) {
            console.error("좋아요 상태 불러오기 실패:", err);
        }
    }


    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("likeButton").addEventListener("click", async () => {
            try {
                const csrfToken = await fetchCsrfToken();

                const response = await fetch(`/api/likes/${currentPostId}`, {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/json",
                        "X-XSRF-TOKEN": csrfToken
                    }
                });

                if (!response.ok) throw new Error("좋아요 요청 실패");

                const result = await response.json();
                const isLiked = result.data?.isLiked;
                const likeCnt = result.data?.likeCnt; // ✅ 좋아요 수 추가로 받기

                const likeText = document.getElementById("likeText");
                const likeBtn = document.getElementById("likeButton");
                const likeCountDisplay = document.getElementById("postLike"); // ✅ span for count

                // ✅ 좋아요 상태 표시
                if (isLiked) {
                    likeBtn.classList.add("text-red-500");
                    likeText.textContent = "좋아요 취소";
                } else {
                    likeBtn.classList.remove("text-red-500");
                    likeText.textContent = "좋아요";
                }

                if (likeCnt !== undefined) {
                    likeCountDisplay.innerText = likeCnt;
                }

            } catch (err) {
                console.error("좋아요 토글 실패:", err);
                showModal("로그인 후 이용해주세요.");
            }
        });
    });

    // 메시지용 모달
    fetch('/common/messagemodal.html')
        .then(res => res.text())
        .then(html => {
            document.getElementById('modal-container').innerHTML = html;
        });


</script>

<script src="/common/common.js"></script>
