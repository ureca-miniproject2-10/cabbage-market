<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메인 페이지</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1>환영합니다!</h1>
  <p>메인 페이지</p>
  <div id="auth-links">
    <a href="/login.html" class="btn btn-primary">로그인 페이지로 이동</a>
    <br/>
    <a href="/admin.html" class="btn btn-secondary mt-2">관리자 페이지로 이동</a>
    <br/>
    <button id="logoutButton" class="btn btn-danger mt-2" style="display: none;">로그아웃</button>
  </div>
</div>
<script src="common/js.js"></script>
<script>
  // 로그아웃 처리
  async function logout() {
    try {
      // CSRF 토큰 가져오기
      const csrfToken = await fetchCsrfToken();

      if (!csrfToken) {
        alert("CSRF 토큰이 설정되지 않았습니다. 페이지를 새로고침 해주세요.");
        return;
      }

      const response = await fetch('/auth/logout', {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json',
          'X-XSRF-TOKEN': csrfToken
        }
      });

      if (response.ok) {
        alert("로그아웃 성공");
        clearCsrfToken();  // CSRF 토큰 캐시 초기화
        window.location.href = "/login.html";
      } else {
        alert("로그아웃 실패");
      }
    } catch (error) {
      console.error("로그아웃 요청 실패:", error);
      alert("로그아웃 요청 실패");
    }
  }


  // 로그인 상태 확인
  async function checkAuthentication() {
    try {
      const response = await fetch('/auth/me', {
        method: 'GET',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json'
        }
      });

      if (response.ok) {
        const data = await response.json();
        if (data.status === "authenticated") {
          document.getElementById("logoutButton").style.display = "block";
        }
      }
    } catch (error) {
      console.error("인증 상태 확인 실패:", error);
    }
  }

  // DOM 로드 후 초기화
  document.addEventListener("DOMContentLoaded", () => {
    checkAuthentication();

    const logoutButton = document.getElementById("logoutButton");
    logoutButton.addEventListener("click", logout);
  });
</script>

</body>
</html>
