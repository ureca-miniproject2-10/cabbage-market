<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배추마켓</title>
  <link rel="stylesheet" href="/common/styles.css">
  <!-- 구글 폰트 추가 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<!-- 네비게이션 바 컨테이너 -->
<div id="navbar-container"></div>

<!-- 메인 콘텐츠 -->
<main class="main">
  <div class="container">
    <!-- 헤더 섹션 -->
    <div class="header-section">
      <h1 class="main-title">
        <span>배추마켓에서 중고거래를 시작해보세요!</span>
      </h1>

      <!-- 검색 바 -->
      <div class="search-bar">
        <div class="search-input-wrapper">
          <input type="text" id="searchInput" class="search-input" placeholder="찾고 싶은 물건을 검색해보세요">
          <button class="search-btn" type="button" onclick="redirectToSearch(event)">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
        </div>
      </div>

      <!-- 인기 검색어 -->
      <div class="popular-keywords">
        <span class="keyword-label">인기 검색어:</span>
        <span class="keyword">노트북</span>
        <span class="keyword">자전거</span>
        <span class="keyword">아이폰</span>
        <span class="keyword">의자</span>
        <span class="keyword">냉장고</span>
        <span class="keyword">책상</span>
        <span class="keyword">모니터</span>
        <span class="keyword">키보드</span>
      </div>
    </div>
  </div>
</main>

<!-- 푸터 컨테이너 -->
<div id="footer-container"></div>
<script>
  function redirectToSearch(event) {
    event.preventDefault(); // 기본 form 제출 막기

    const input = document.getElementById("searchInput");
    if (input) {
      const query = input.value.trim();
      if (query !== "") {
        window.location.href = `/posts.html?query=${encodeURIComponent(query)}`;
      }
    }
  }
</script>
<script src="/common/csrf.js"></script>
<script src="/common/common.js"></script>
</body>
</html>
